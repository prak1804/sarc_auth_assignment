name: SARC Auth CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Auth Service Tests ────────────────────────────────────────────────────
  test-auth-service:
    name: Test Centralized Auth Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auth_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-auth-${{ hashFiles('auth_service/requirements.txt') }}

      - name: Install auth service dependencies
        working-directory: auth_service
        run: pip install -r requirements.txt

      - name: Run auth service migrations
        working-directory: auth_service
        env:
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
          AUTH_DB_NAME: auth_db_test
          AUTH_DB_USER: postgres
          AUTH_DB_PASSWORD: postgres
          AUTH_DB_HOST: localhost
          AUTH_DB_PORT: 5432
        run: python manage.py migrate

      - name: Run auth service tests
        working-directory: auth_service
        env:
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
          AUTH_DB_NAME: auth_db_test
          AUTH_DB_USER: postgres
          AUTH_DB_PASSWORD: postgres
          AUTH_DB_HOST: localhost
          AUTH_DB_PORT: 5432
        run: python manage.py test auth_app --verbosity=2

  # ─── Independent Site Tests ────────────────────────────────────────────────
  test-indie-site:
    name: Test Independent Site
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: indie_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-indie-${{ hashFiles('independent_site/requirements.txt') }}

      - name: Install indie site dependencies
        working-directory: independent_site
        run: pip install -r requirements.txt

      - name: Run indie site migrations
        working-directory: independent_site
        env:
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
          INDIE_DB_NAME: indie_db_test
          INDIE_DB_USER: postgres
          INDIE_DB_PASSWORD: postgres
          INDIE_DB_HOST: localhost
          INDIE_DB_PORT: 5432
          CENTRAL_AUTH_SERVICE_URL: http://localhost:8000
        run: python manage.py migrate

      - name: Run indie site tests
        working-directory: independent_site
        env:
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
          INDIE_DB_NAME: indie_db_test
          INDIE_DB_USER: postgres
          INDIE_DB_PASSWORD: postgres
          INDIE_DB_HOST: localhost
          INDIE_DB_PORT: 5432
          CENTRAL_AUTH_SERVICE_URL: http://localhost:8000
        run: python manage.py test indie_app --verbosity=2

  # ─── Frontend Build Check ──────────────────────────────────────────────────
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_AUTH_SERVICE_URL: http://localhost:8000
          REACT_APP_INDIE_SERVICE_URL: http://localhost:8001
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ─── Deploy (on push to main only) ─────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [test-auth-service, test-indie-site, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      # ── Deploy Frontend to Vercel ──────────────────────────────────────────
      - name: Deploy Frontend to Vercel
        if: ${{ vars.DEPLOY_FRONTEND == 'true' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

      # ── Trigger Render Deploy for Auth Service ────────────────────────────
      - name: Deploy Auth Service to Render
        if: ${{ vars.DEPLOY_BACKEND == 'true' }}
        run: |
          curl -s -X POST "${{ secrets.RENDER_AUTH_DEPLOY_HOOK }}"

      # ── Trigger Render Deploy for Indie Site ──────────────────────────────
      - name: Deploy Indie Site to Render
        if: ${{ vars.DEPLOY_BACKEND == 'true' }}
        run: |
          curl -s -X POST "${{ secrets.RENDER_INDIE_DEPLOY_HOOK }}"
